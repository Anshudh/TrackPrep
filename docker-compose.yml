version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: trackprep-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: trackprep
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Automatically run schema.sql to load tables on database initialization
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql

  redis:
    image: redis:7-alpine
    container_name: trackprep-redis
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - redisdata:/data

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    container_name: trackprep-server
    restart: always
    ports:
      - "5000:5000"
    env_file:
      - ./server/.env
    environment:
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_HOST=db
      - DB_PORT=5432
      - DB_DATABASE=trackprep
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - db
      - redis

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    container_name: trackprep-client
    restart: always
    ports:
      - "5173:5173"
    environment:
      - BACKEND_URL=http://server:5000
    depends_on:
      - server

volumes:
  pgdata:
  redisdata:
